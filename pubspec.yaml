publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.18.1
  fluttertoast: ^8.2.2
  file_picker: ^8.1.0
  path_provider: ^2.1.0
  permission_handler: ^11.0.1
